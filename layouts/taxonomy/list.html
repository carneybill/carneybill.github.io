{{ define "main" }}
<main class="page-main taxonomy-page" role="main">
  <section class="page-hero">
    <p class="section-eyebrow">Topic</p>
    <h1>{{ .Title }}</h1>
    <p>Insights and notes grouped by this theme.</p>
  </section>
  <section class="blog-content insight-grid">
    {{ range .Pages }}
      {{ partial "insight-card.html" (dict "page" .) }}
    {{ end }}
  </section>
</main>
{{ end }}
