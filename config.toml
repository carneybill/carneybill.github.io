baseURL = "https://carney.wiki/"
languageCode = "en"
title = "carney.wiki"
author = "Bill Carney"
description = "Bill Carney helps technical B2B companies turn complexity into clarity, credibility, and growth through positioning, AI-era trust, and growth systems."
copyright = "" # set to override the auto generated copyright using org info and now year
googleAnalytics = "G-861LVY2WMP"
disqusShortname = ""
metaDataFormat = "yaml"
pygmentsCodeFences = true
pygmentsOptions = "linenos=table"
# see more styles https://help.farbox.com/pygments.html
pygmentsStyle = "friendly"
footnoteReturnLinkContents = "&#8617;" # ↩
# set deliberately low for testing choose your preffered number based on the blog layout you've chosen
paginate = 9
preserveTaxonomyNames = true

[params]
  orgName = "carney.wiki"
  orgLocal = "Brooklyn, NY"
  favicon = "/img/favicon.ico?v=0"
  logo = "/img/blogophonic-mark-dark.png"
  # font options: sans-serif or serif
  # for more http://tachyons.io/docs/typography/font-family/
  textFontFamily = "sans-serif"
  headingFontFamily = "serif"
  # basic color options: use only color names as shown in the
  # "Color Palette" section of http://tachyons.io/docs/themes/skins/
  siteBgColor = "black"
  sidebarBgColor = "dark-blue"
  headlineColor = "near-white"
  headingColor = "near-white"
  textColor = "light-silver"
  sidebarTextColor = "light-silver"
  bodyLinkColor = "blue"
  navLinkColor = "near-white"
  sidebarLinkColor = "light-blue"
  footerTextColor = "light-silver"
  buttonTextColor = "near-white"
  buttonBgColor = "black"
  buttonHoverTextColor = "white"
  buttonHoverBgColor = "blue"
  borderColor = "moon-gray"
  # show/hide social icons in site header/footer
  socialInHeader = false
  socialInFooter = false

[social]
  # social accounts (username only)
  linkedin = "in/bcarney"
  github = "carneybill"
  medium = ""

[taxonomies]
  category = "categories"
  series = "series"
  tag = "tags"

[markup]
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 2
    ordered = false

[outputs]
  home = ["HTML", "RSS", "JSON"]
